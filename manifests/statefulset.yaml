apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
spec:
  replicas: 1
  serviceName: shiftclaw
  selector:
    matchLabels:
      app.kubernetes.io/name: shiftclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shiftclaw
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: shiftclaw
      automountServiceAccountToken: false
      # Init container copies openclaw.json from the ConfigMap (read-only) into the
      # PVC (writable) on every start, so OpenClaw can write temp files alongside it.
      initContainers:
        - name: init-config
          image: ghcr.io/rarguello/shiftclaw:2026.4.24
          imagePullPolicy: Always
          command: ["sh", "-c", "[ -f /var/lib/openclaw/openclaw.json ] || cp /run/config/openclaw.json /var/lib/openclaw/openclaw.json"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: shiftclaw-state
              mountPath: /var/lib/openclaw
            - name: shiftclaw-config
              mountPath: /run/config
              readOnly: true
      containers:
        - name: shiftclaw
          image: ghcr.io/rarguello/shiftclaw:2026.4.24
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
            # Uncomment for browser automation:
            # - name: browser
            #   containerPort: 18791
            #   protocol: TCP
          envFrom:
            # OPENROUTER_API_KEY, TELEGRAM_BOT_TOKEN, and OPENCLAW_GATEWAY_TOKEN come from here.
            # Create with: oc create secret generic shiftclaw --from-env-file=.env -n shiftclaw
            - secretRef:
                name: shiftclaw
          env:
            - name: XDG_CONFIG_HOME
              value: /var/lib/openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /var/lib/openclaw/openclaw.json
            - name: NODE_ENV
              value: production
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
            - name: HOME
              value: /var/lib/openclaw
            # Discard shell history — prevents .bash_history from accumulating
            # on the PVC when exec-ing into the container.
            - name: HISTFILE
              value: /dev/null
            - name: HISTSIZE
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # Raise cpu/memory if you enable browser automation or heavy tool use.
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: gateway
            # Allow up to 60 s for the gateway to start (10 s delay + 10 × 5 s).
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            # PVC: persistent state + config (both writable — OpenClaw writes temp files)
            - name: shiftclaw-state
              mountPath: /var/lib/openclaw
            # emptyDir: /tmp must be writable even with readOnlyRootFilesystem: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: shiftclaw-config
          configMap:
            name: shiftclaw-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: shiftclaw-state
        labels:
          app.kubernetes.io/name: shiftclaw
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
