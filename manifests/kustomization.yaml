apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
  - service.yaml
  - statefulset.yaml
  # secret.yaml is intentionally excluded — never commit real credentials.
  # Create the Secret imperatively before applying:
  #   kubectl create secret generic shiftclaw --from-env-file=.env --namespace=shiftclaw
