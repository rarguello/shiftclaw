apiVersion: v1
kind: ServiceAccount
metadata:
  name: shiftclaw
  namespace: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/component: rbac
# No RBAC rules needed — ShiftClaw does not call the Kubernetes API.
# automountServiceAccountToken is disabled at the Pod level in deployment.yaml.
automountServiceAccountToken: false
