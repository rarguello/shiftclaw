apiVersion: apps/v1
kind: Deployment
metadata:
  name: shiftclaw
  namespace: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/version: "2026.4.2"
spec:
  replicas: 1
  # ReadWriteOnce PVC requires exactly 1 replica. Use Recreate to avoid two pods
  # fighting over the PVC during rollouts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: shiftclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shiftclaw
        app.kubernetes.io/version: "2026.4.2"
    spec:
      # -----------------------------------------------------------------------
      # Pod-level security
      # -----------------------------------------------------------------------
      securityContext:
        # Refuse to start if the container tries to run as root.
        runAsNonRoot: true
        # Use the kernel's default seccomp profile — blocks ~50 rarely-used syscalls.
        seccompProfile:
          type: RuntimeDefault
        # fsGroup is intentionally omitted — OpenShift's restricted-v2 SCC forbids group 0
        # and assigns an fsGroup from the namespace's allowed range automatically.
        # kubelet then chowns the PVC to that group; the image's chmod g=u ensures it works.

      # Use the dedicated ServiceAccount (no default SA token, no RBAC rules).
      serviceAccountName: shiftclaw
      automountServiceAccountToken: false

      # Init container copies openclaw.json from the ConfigMap (read-only) into the
      # PVC (writable) on every start, so OpenClaw can write temp files alongside it.
      initContainers:
        - name: seed-config
          image: quay.io/daytwo/shiftclaw:latest
          command: ["sh", "-c", "[ -f /var/lib/openclaw/openclaw.json ] || cp /run/config/openclaw.json /var/lib/openclaw/openclaw.json"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: shiftclaw-state
              mountPath: /var/lib/openclaw
            - name: shiftclaw-config
              mountPath: /run/config
              readOnly: true

      containers:
        - name: shiftclaw
          # The image is built and pushed by .github/workflows/build.yaml.
          image: quay.io/daytwo/shiftclaw:latest
          imagePullPolicy: Always

          # -----------------------------------------------------------------------
          # Container-level security — defense in depth
          # -----------------------------------------------------------------------
          securityContext:
            # Never gain more privileges than the process starts with.
            allowPrivilegeEscalation: false
            # Mount the container's root filesystem read-only.
            # Writable paths are provided as volumes below (/tmp, /var/lib/openclaw).
            readOnlyRootFilesystem: true
            capabilities:
              # Drop every Linux capability. OpenClaw does not need any.
              drop:
                - ALL
            # OpenShift: do NOT set runAsUser here — the SCC assigns it from the
            # namespace UID range. The image USER 1001 applies on plain Kubernetes.
            # Uncomment the next line ONLY for plain Kubernetes if you want a fixed UID:
            # runAsUser: 1001

          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
            # Uncomment for browser automation:
            # - name: browser
            #   containerPort: 18791
            #   protocol: TCP

          # -----------------------------------------------------------------------
          # Environment
          # -----------------------------------------------------------------------
          envFrom:
            # OPENROUTER_API_KEY, TELEGRAM_BOT_TOKEN, and OPENCLAW_GATEWAY_TOKEN come from here.
            # Create with: kubectl create secret generic shiftclaw-secrets --from-env-file=.env -n shiftclaw
            - secretRef:
                name: shiftclaw-secrets

          env:
            # Official state dir pattern from Hetzner docs — XDG_CONFIG_HOME controls
            # where openclaw stores its config, auth profiles, and agent state.
            - name: XDG_CONFIG_HOME
              value: /var/lib/openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /var/lib/openclaw/openclaw.json
            - name: NODE_ENV
              value: production
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
            # HOME must be writable; with readOnlyRootFilesystem the default /opt/app-root/src is read-only.
            - name: HOME
              value: /var/lib/openclaw

          # -----------------------------------------------------------------------
          # Resource limits
          # -----------------------------------------------------------------------
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # Raise cpu/memory if you enable browser automation or heavy tool use.
              cpu: "1"
              memory: 1Gi

          # -----------------------------------------------------------------------
          # Probes
          # -----------------------------------------------------------------------
          startupProbe:
            exec:
              command: ["openclaw", "--version"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12  # 60s total startup budget
          livenessProbe:
            exec:
              command: ["openclaw", "--version"]
            periodSeconds: 30
            failureThreshold: 3

          # -----------------------------------------------------------------------
          # Volume mounts
          # -----------------------------------------------------------------------
          volumeMounts:
            # PVC: persistent state + config (both writable — OpenClaw writes temp files)
            - name: shiftclaw-state
              mountPath: /var/lib/openclaw
            # emptyDir: /tmp must be writable even with readOnlyRootFilesystem: true
            - name: tmp
              mountPath: /tmp

      # -----------------------------------------------------------------------
      # Volumes
      # -----------------------------------------------------------------------
      volumes:
        - name: shiftclaw-state
          persistentVolumeClaim:
            claimName: shiftclaw-state
        - name: shiftclaw-config
          configMap:
            name: shiftclaw-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
