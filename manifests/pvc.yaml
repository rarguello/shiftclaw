apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shiftclaw-state
  namespace: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Covers agent state, conversation history, embeddings cache, and plugin data.
      # Increase if you use heavy browser automation or large file tools.
      storage: 5Gi
  # storageClassName is intentionally omitted — uses the cluster default.
  # On OpenShift: typically gp3-csi or similar.
  # On plain Kubernetes: whatever the cluster admin has set as default.
  # Uncomment and set explicitly if needed:
  # storageClassName: gp3-csi
