apiVersion: v1
kind: ConfigMap
metadata:
  name: shiftclaw-config
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/component: config
data:
  # Non-sensitive OpenClaw configuration.
  # Sensitive values (API keys, tokens) MUST go in the Secret, not here.
  # Regenerate with: oc create configmap shiftclaw-config \
  #   --from-file=openclaw.json=config/openclaw.json \
  #   --namespace=shiftclaw --dry-run=client -o yaml | oc apply -f -
  openclaw.json: |
    {
      "models": {
        "mode": "merge",
        "providers": {
          "openrouter": {
            "baseUrl": "https://openrouter.ai/api/v1",
            "apiKey": "${OPENROUTER_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "openrouter/free", "name": "Free (auto-selected by OpenRouter)" }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "openrouter/free"
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true
        }
      }
    }
