apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shiftclaw
  namespace: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: shiftclaw

  # -----------------------------------------------------------------------
  # Ingress — allow nothing from outside the cluster.
  # The only access path is kubectl port-forward (bypasses NetworkPolicy).
  # -----------------------------------------------------------------------
  ingress: []

  # -----------------------------------------------------------------------
  # Egress
  # -----------------------------------------------------------------------
  egress:
    # DNS — OpenShift OVN-Kubernetes requires an explicit rule targeting the
    # openshift-dns namespace. DNS pods listen on port 5353
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
            podSelector:
              matchLabels:
                app: dns
      ports:
        - port: 5353
          protocol: UDP
    # HTTPS — OpenRouter and Telegram APIs.
    - ports:
        - port: 443
          protocol: TCP

  policyTypes:
    - Ingress
    - Egress
