apiVersion: v1
kind: Service
metadata:
  name: shiftclaw
  labels:
    app.kubernetes.io/name: shiftclaw
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: shiftclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: gateway
      protocol: TCP
    # Uncomment if browser automation (headless Chrome) is needed:
    # - name: browser
    #   port: 18791
    #   targetPort: browser
    #   protocol: TCP

# For local access, port-forward directly to the pod (not the service):
#   oc port-forward pod/shiftclaw-0 18789:18789 -n shiftclaw
