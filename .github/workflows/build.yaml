name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Pin the openclaw version here; update to upgrade.
  OPENCLAW_VERSION: "2026.4.5"
  # Opt into Node.js 24 for all actions now — becomes the default in June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Build (and push on main/tags)
  # ---------------------------------------------------------------------------
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required to upload SARIF results to the Security tab.
      security-events: write
      # Required for SBOM / provenance attestation.
      id-token: write

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only authenticate when we will actually push (not on PRs from forks).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semantic version tag from git tag (e.g. v2026.4.2 → 2026.4.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # openclaw upstream version embedded in every image
            type=raw,value=${{ env.OPENCLAW_VERSION }}
            # Short SHA for traceability
            type=sha,prefix=sha-,format=short
            # latest only on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=OpenClaw
            org.opencontainers.image.description=OpenClaw autonomous AI agent on UBI 10 + Node.js 24
            org.opencontainers.image.vendor=shiftclaw
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          # Push only on main branch or tag pushes — never on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_VERSION=${{ env.OPENCLAW_VERSION }}
          # Multi-platform: amd64 for standard x86 clusters, arm64 for Graviton/Apple M1 nodes.
          platforms: linux/amd64,linux/arm64
          # GitHub Actions layer cache — dramatically speeds up repeat builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Generate SBOM and provenance attestation for supply-chain security.
          provenance: true
          sbom: true

  # ---------------------------------------------------------------------------
  # Security scan — runs on every build (including PRs)
  # ---------------------------------------------------------------------------
  scan:
    name: Trivy CVE scan
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout (for .trivyignore if present)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          # Scan by digest for exact reproducibility.
          image-ref: ${{ needs.build.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          # Only fail the build on CRITICAL CVEs — HIGH findings in transitive
          # npm deps (openclaw upstream) are reported but do not block the build.
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
